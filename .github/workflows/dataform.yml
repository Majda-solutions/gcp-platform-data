name: Dataform CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  dataform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure gcloud project
        run: |
          gcloud config set project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Compile Dataform project
        run: npx @dataform/cli compile

      - name: Create Dataform credentials file
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > .df-credentials.json

      - name: Run Dataform project on push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx @dataform/cli run
